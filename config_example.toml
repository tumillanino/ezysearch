# ezysearch configuration file
# This file is automatically generated. You can customize it to your preferences.

# Key bindings for different search modes
package_search_key = "Ctrl+P"
github_search_key = "Ctrl+G"
directory_search_key = "Ctrl+T"

# GitHub search settings
github_limit = 50

# Directory search settings
directory_command = "fd --hidden --strip-cwd-prefix --exclude .git"
preview_command = "bat --color=always -n --line-range :500 {}"

# Cache expiry time in minutes
cache_expiry = 60

# Package manager settings
[package_manager]
  # Change this to "doas" if you prefer doas over sudo
  sudo = "doas"
  
  # Set to false to skip confirmation before installing packages
  confirm_install = true
  
  # Additional flags for different package managers
  # Example: pacman_flags = ["--noconfirm", "--noprogressbar"]
  pacman_flags = []
  apt_flags = []
  dnf_flags = []
  zypper_flags = []
  brew_flags = []
  yay_flags = []

# UI settings
[ui]
  # Color scheme (default, monochrome, etc.)
  color_scheme = "default"
  
  # Show package counts in search results
  show_package_count = true
  
  # Enable syntax highlighting for package scripts
  syntax_highlighting = true