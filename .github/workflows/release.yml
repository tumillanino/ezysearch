name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist
          version="${VERSION#v}"
          ldflags="-s -w -X github.com/tumillanino/ezysearch/internal/cli.Version=${version}"

          build() {
            goos="$1"
            goarch="$2"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            name="ezysearch_${VERSION}_${goos}_${goarch}"
            workdir="dist/${name}"
            mkdir -p "$workdir"

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build -trimpath -ldflags "$ldflags" -o "${workdir}/ezysearch${ext}" .
            cp README.md "$workdir/"

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -qr "${name}.zip" "$name")
            else
              tar -C dist -czf "dist/${name}.tar.gz" "$name"
            fi

            rm -rf "$workdir"
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
